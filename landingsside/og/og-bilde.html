<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<!--
  Generator for OpenGraph-bildet til landingssiden (1200x630).
  Regenerer med:
  "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --headless \
    --window-size=1200,630 --screenshot=../img/og-bilde.png og-bilde.html
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Schibsted+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blaa: #4a90e2;
    --blekk: #2c3e50;
    --blekk-lys: #5d6d7e;
    --oransje: #e67e22;
    --groenn: #27ae60;
    --papir: #f7f9fc;
    --rutenett-fin: rgba(74, 144, 226, 0.07);
    --rutenett-grov: rgba(74, 144, 226, 0.16);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: "Schibsted Grotesk", sans-serif;
    color: var(--blekk);
    background-color: var(--papir);
    background-image:
      linear-gradient(var(--rutenett-grov) 1px, transparent 1px),
      linear-gradient(90deg, var(--rutenett-grov) 1px, transparent 1px),
      linear-gradient(var(--rutenett-fin) 1px, transparent 1px),
      linear-gradient(90deg, var(--rutenett-fin) 1px, transparent 1px);
    background-size: 60px 60px, 60px 60px, 12px 12px, 12px 12px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 90px;
  }

  /* X/Y-akser som på landingssiden */
  .akse-x, .akse-y { position: absolute; background: rgba(74, 144, 226, 0.35); }
  .akse-x { left: 0; right: 0; bottom: 84px; height: 2px; }
  .akse-y { top: 0; bottom: 0; left: 84px; width: 2px; }

  .brand { display: flex; align-items: center; gap: 18px; margin-bottom: 38px; }
  .brand-ikon {
    display: grid; place-items: center;
    width: 86px; height: 86px;
    background: var(--blaa);
    border-radius: 22px;
    box-shadow: 0 14px 36px rgba(74, 144, 226, 0.40);
  }
  .brand-ikon svg { width: 54px; height: 54px; }
  .brand-tekst { display: flex; flex-direction: column; line-height: 1.12; }
  .brand-navn { font-family: "Baloo 2", sans-serif; font-weight: 800; font-size: 52px; }
  .brand-tagline { font-size: 22px; color: var(--blekk-lys); font-weight: 500; }
  .brand-tagline strong { color: var(--blekk); font-weight: 700; }

  h1 {
    font-family: "Baloo 2", sans-serif;
    font-weight: 800;
    font-size: 100px;
    line-height: 1.02;
    letter-spacing: -1px;
    display: flex;
    gap: 26px;
  }
  .ord--blaa { color: var(--blaa); }
  .ord--oransje { color: var(--oransje); }
  .ord--groenn { color: var(--groenn); }

  .under {
    margin-top: 26px;
    font-size: 30px;
    font-weight: 500;
    color: var(--blekk-lys);
    max-width: 760px;
    line-height: 1.35;
  }
  .under strong { color: var(--blekk); }

  .chips { display: flex; gap: 14px; margin-top: 34px; }
  .chip {
    font-size: 21px;
    font-weight: 600;
    padding: 9px 20px;
    border-radius: 999px;
    background: #fff;
    border: 1.5px solid rgba(44, 62, 80, 0.14);
    box-shadow: 0 6px 18px rgba(44, 62, 80, 0.08);
  }
  .chip .hake { color: var(--groenn); margin-right: 6px; }

  /* Måle-chip og hull-sirkel som pynt, hentet fra hero-en */
  .maal-chip {
    position: absolute;
    font-family: "Baloo 2", sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: #fff;
    background: var(--oransje);
    padding: 6px 16px;
    border-radius: 10px;
    box-shadow: 0 10px 24px rgba(230, 126, 34, 0.45);
    transform: rotate(6deg);
  }
  .maal-chip--1 { top: 84px; right: 90px; }
  .maal-chip--2 { bottom: 105px; right: 215px; background: var(--groenn); box-shadow: 0 10px 24px rgba(39, 174, 96, 0.45); transform: rotate(-5deg); }
  .hull-sirkel {
    position: absolute;
    top: 165px; right: 85px;
    width: 130px; height: 130px;
    border: 4px dashed var(--oransje);
    border-radius: 50%;
    opacity: 0.85;
  }

  /* Stor dekorativ kube til høyre */
  .deko-kube { position: absolute; right: 48px; top: 330px; width: 180px; height: 180px; filter: drop-shadow(0 24px 40px rgba(44, 62, 80, 0.25)); }
</style>
</head>
<body>
  <div class="akse-x"></div>
  <div class="akse-y"></div>

  <div class="brand">
    <span class="brand-ikon">
      <svg viewBox="0 0 64 64">
        <path d="M32 4 60 18v28L32 60 4 46V18z" fill="#e3edf9"/>
        <path d="M32 4 60 18 32 32 4 18z" fill="#ffffff"/>
        <path d="M32 32v28L4 46V18z" fill="#c9dcf4"/>
      </svg>
    </span>
    <span class="brand-tekst">
      <span class="brand-navn">Akse</span>
      <span class="brand-tagline">En <strong>Skaperiet</strong> tjeneste</span>
    </span>
  </div>

  <h1>
    <span class="ord--blaa">Tegn.</span>
    <span class="ord--oransje">Bygg.</span>
    <span class="ord--groenn">Print.</span>
  </h1>

  <p class="under">
    Norsk 3D-modellering for barn og unge — rett i nettleseren,
    med <strong>STL-eksport</strong> klar for 3D-printeren.
  </p>

  <div class="chips">
    <span class="chip"><span class="hake">✓</span>Gratis</span>
    <span class="chip"><span class="hake">✓</span>Helt på norsk</span>
    <span class="chip"><span class="hake">✓</span>Åpen kildekode</span>
  </div>

  <svg class="deko-kube" viewBox="0 0 64 64">
    <path d="M32 4 60 18v28L32 60 4 46V18z" fill="#4a90e2"/>
    <path d="M32 4 60 18 32 32 4 18z" fill="#6aa9ec"/>
    <path d="M32 32v28L4 46V18z" fill="#3a7bc8"/>
  </svg>
  <span class="maal-chip maal-chip--1">21.5</span>
  <span class="maal-chip maal-chip--2">H: 10 mm</span>
  <span class="hull-sirkel"></span>
</body>
</html>
